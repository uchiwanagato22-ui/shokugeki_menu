name: shokugeki_menu
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Design
  cupertino_icons: ^1.0.8

  # Firebase (versions compatibles)
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_storage: ^13.1.0
  firebase_messaging: ^16.1.2
  cloud_functions: ^6.3.2

  # PDF / Impression
  pdf: ^3.11.1
  printing: ^5.13.4

  # Images / Cache
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # Notifications locales
  flutter_local_notifications: ^22.0.0

  # Stockage local
  shared_preferences: ^2.5.3

  # GPS / Livraison
  google_maps_flutter: ^2.11.0
  geolocator: ^14.0.2
  url_launcher: ^6.3.1

  # Gemini Chef IA
  google_generative_ai: ^0.4.0

  # API / Upload
  http: ^1.2.2


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0


flutter:
  uses-material-design: true

  assets:
    - assets/images/nagato_avatar.png