workflows:
  android-workflow:
    name: Shokugeki Menu Android Build
    max_build_duration: 60

    environment:
      flutter: 3.44.2

      groups:
        - gemini_keys

      vars:
        GEMINI_MODEL: gemini-2.5-flash

    triggering:
      events:
        - push

      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Flutter clean
        script: |
          flutter clean

      - name: Get packages
        script: |
          flutter pub get

      - name: Check Gemini API key
        script: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "ERROR: GEMINI_API_KEY missing"
            exit 1
          fi

      - name: Build APK Release
        script: |
          flutter build apk --release \
          --dart-define=GEMINI_API_KEY=$GEMINI_API_KEY \
          --dart-define=GEMINI_MODEL=$GEMINI_MODEL

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk