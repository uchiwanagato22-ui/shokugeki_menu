workflows:
  android-workflow:
    name: Shokugeki Menu Android Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      # Sécurise la clé Gemini : ne doit pas être commit dans le repo.
      # Dans Codemagic UI, tu peux aussi définir cette variable.
      GEMINI_API_KEY: $GEMINI_API_KEY

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build Android APK
        script: |
          flutter build apk --release --dart-define=GEMINI_API_KEY=$GEMINI_API_KEY
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - uchiwanagato22@gmail.com
        notify:
          success: true
          failure: true